<html xmlns:wicket="http://wicket.apache.org">
<head>
<wicket:head>
	<title>Wicket jQuery UI: auto-complete (custom template)</title>
</wicket:head>
</head>
<body>
<wicket:extend>
	<div id="demo-panel">
		<form wicket:id="form">
			<div>Select a metal genre: (containing any char)</div>
			<br/>
			<input wicket:id="autocomplete" type="text" size="30" /><br/>
			<br/>
			<div wicket:id="feedback" style="width: 360px;"></div>
		</form>
	</div>
    <div id="demo-panel1">
        <form wicket:id="form1">
            <div>Select a metal genre: (containing any char)</div>
            <br/>
            <input wicket:id="autocomplete1" type="text" size="30" /><br/>
            <br/>
            <div wicket:id="feedback1" style="width: 360px;"></div>
        </form>
    </div>
</wicket:extend>
</body>
</html>
